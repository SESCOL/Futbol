  return {x:W/2-gw/2, y:Math.round(H*0.42), w:gw, h:gh};

function pickWord(){
  const e=WORDS[Math.floor(Math.random()*WORDS.length)];
  correctLetter=e.word[e.blank];
  wordLetters=e.word.split('').map((l,i)=>i===e.blank?'_':l);
  updateHUD();
  spawnBalls();
  rival.hasBall=false; rival.rivalLetter=''; rival.state='chase';
  player.hasBall=false; rival.target=null;
  setTimeout(()=>showHint(`La letra que falta es... ¿cuál tendrá el rival?`),400);
}

function spawnBalls(){
  balls=[];
  const g=goalRect();
  const abc='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const distractors=[];
  while(distractors.length<3){ const l=abc[Math.floor(Math.random()*abc.length)]; if(l!==correctLetter&&!distractors.includes(l)) distractors.push(l); }
  const letters=[correctLetter,...distractors].sort(()=>Math.random()-.5);
  for(const letter of letters){
    let bx,by,tries=0;
    const fieldTop=H*0.58;
    do{ bx=80+Math.random()*(W-160); by=fieldTop+20+Math.random()*(H-fieldTop-110); tries++; }
    while(tries<30&&Math.hypot(bx-player.x,by-player.y)<80);
    balls.push({x:bx,y:by,vx:0,vy:0,radius:20,letter,spin:0,spinSpd:0,kicked:false,kickedLetter:''});
  }
  // El rival empieza a perseguir la pelota correcta
  // El rival buscará target automáticamente en updateRival
  rival.target=null; rival.rivalLetter=''; rival.state='chase';
}

// ═══════════════════════════════════════════════
//  DISPARO
// ═══════════════════════════════════════════════
function tryKick(){
  if(player.kicking) return;
  const g=goalRect();

  // 1. Si hay una pelota pegada al jugador, dispararla
  for(const b of balls){
    if(b.kicked) continue;
    const d=Math.hypot(b.x-player.x, b.y-player.y);
    if(d < player.radius+b.radius+10){
      const dx=g.x+g.w/2-b.x, dy=g.y+g.h/2-b.y, len=Math.hypot(dx,dy)||1;
      b.vx=dx/len*680; b.vy=dy/len*680;
      b.kicked=true; b.kickedLetter=b.letter;
      if(rival.hasBall && rival.target===b){ rival.hasBall=false; rival.target=null; }
      player.hasBall=false; player.kicking=true; player.kickTimer=1;
      return;
    }
  }

  // 2. Si no hay pelota pegada, disparar la más cercana de todas
  let closest=null, minD=Infinity;
  for(const b of balls){
    if(b.kicked) continue;
    const d=Math.hypot(b.x-player.x, b.y-player.y);
    if(d<minD){ minD=d; closest=b; }
  }
  if(!closest) return;
  const dx=g.x+g.w/2-closest.x, dy=g.y+g.h/2-closest.y, len=Math.hypot(dx,dy)||1;
  closest.vx=dx/len*680; closest.vy=dy/len*680;
  closest.kicked=true; closest.kickedLetter=closest.letter;
  if(rival.hasBall && rival.target===closest){ rival.hasBall=false; rival.target=null; }
  player.hasBall=false; player.kicking=true; player.kickTimer=1;
}

function hitBtn(cx,cy,pos){ return Math.hypot(cx-pos.x,cy-pos.y)<BTN_R*1.5; }
function onTouchStart(cx,cy,tid){
  // Si está en pantalla de campeonato, tap reinicia
  if(championship){
    const bw=Math.min(280,W*0.7), bh=54, bx=W/2-bw/2, by=H*0.86;
    if(cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh){
      championship=false; score=0; lives=3; continues=2; updateHUD();
      particles=[];
      player.x=W/2; player.y=H*.72;
      rival.x=W/2+80; rival.y=H*.5;
      pickWord(); gameRunning=true;
    }
    return;
  }
  // Pantalla de game over
  if(gameOverScreen){
    if(continues>0){
      // Botón CONTINUAR
      const bw=Math.min(240,W*0.62), bh=50, bx=W/2-bw/2, by=H*0.76;
      if(cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh){ continues--; doContinue(); return; }
      // Botón REINICIAR
      const bw2=Math.min(200,W*0.52), bh2=42, bx2=W/2-bw2/2, by2=H*0.87;
      if(cx>=bx2&&cx<=bx2+bw2&&cy>=by2&&cy<=by2+bh2){ doRealRestart(); return; }
    } else {
      // Botón nuevo juego
      const bw=Math.min(250,W*0.65), bh=52, bx=W/2-bw/2, by=H*0.68;
      if(cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh){ doRealRestart(); return; }
    }
    return;
  }
  const sb=shootBtnPos();
  // Botón de disparo
  if(Math.hypot(cx-sb.x,cy-sb.y)<SHOOT_R*1.6&&shootTid===-1){ shootTid=tid; tryKick(); return; }
  // Joystick: toque en la zona izquierda de la pantalla
  if(cx < W/2 && !joy.active){
    joy.active=true; joy.tid=tid;
    const jc=joyCenter();
    joy.cx=jc.x; joy.cy=jc.y;
    joy.kx=jc.x; joy.ky=jc.y;
    joy.dx=0; joy.dy=0;
  }
}
function onTouchMove(cx,cy,tid){
  if(tid===joy.tid && joy.active){
    const dx=cx-joy.cx, dy=cy-joy.cy;
    const dist=Math.hypot(dx,dy);
    const maxD=JOY_R-JOY_KR/2;
    if(dist>maxD){ joy.kx=joy.cx+dx/dist*maxD; joy.ky=joy.cy+dy/dist*maxD; }
    else { joy.kx=cx; joy.ky=cy; }
    const nd=Math.max(dist,1);
    joy.dx=dx/nd; joy.dy=dy/nd;
    if(dist<8){ joy.dx=0; joy.dy=0; }
  }
}
function onTouchEnd(tid){
  if(tid===shootTid){shootTid=-1;return;}
  if(tid===joy.tid){ joy.active=false; joy.tid=-1; joy.dx=0; joy.dy=0; const jc=joyCenter(); joy.kx=jc.x; joy.ky=jc.y; }
}

canvas.addEventListener('touchcancel',e=>{e.preventDefault();for(const t of e.changedTouches)onTouchEnd(t.identifier);},{passive:false});

let audioCtx=null;
function startAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const master=audioCtx.createGain(); master.gain.value=0.15; master.connect(audioCtx.destination);
  const freqs=[180,230,280,340,420];
  for(const f of freqs){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=audioCtx.createBufferSource(); src.buffer=buf; src.loop=true;
    const flt=audioCtx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=f; flt.Q.value=0.7+Math.random();
    const lfo=audioCtx.createOscillator(); const lg=audioCtx.createGain(); lfo.frequency.value=0.06+Math.random()*.12; lg.gain.value=0.05;
    lfo.connect(lg); lg.connect(flt.gain); lfo.start();
    const g=audioCtx.createGain(); g.gain.value=0.28+Math.random()*.35;
    src.connect(flt); flt.connect(g); g.connect(master); src.start(0,Math.random()*2);
  }
  function whistle(){ if(!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.frequency.value=2300+Math.random()*700; o.type='sine'; g.gain.setValueAtTime(0,audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.11,audioCtx.currentTime+.05); g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.45); o.connect(g); g.connect(master); o.start(); o.stop(audioCtx.currentTime+.5); setTimeout(whistle,3500+Math.random()*7000); }
  setTimeout(whistle,1800);
}
function goalRoar(){
  if(!audioCtx) return;
  const m=audioCtx.createGain(); m.gain.setValueAtTime(.38,audioCtx.currentTime); m.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+2.5); m.connect(audioCtx.destination);
  for(let i=0;i<6;i++){ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.frequency.value=180+Math.random()*350; o.type='sawtooth'; g.gain.value=.11; o.connect(g); g.connect(m); o.start(); o.stop(audioCtx.currentTime+2.5); }
}
function tackleSound(){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.frequency.value=90; o.type='square';
  g.gain.setValueAtTime(.25,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.18);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+.2);
}

function trumpetFanfare(){
  if(!audioCtx) return;
  const master=audioCtx.createGain();
  master.gain.value=0.22;
  master.connect(audioCtx.destination);
  // Melodía de trompeta: Do-Mi-Sol-Do (fanfarria)
  const notes=[523,659,784,1047, 784,1047];
  const durs =[0.12,0.12,0.12,0.22, 0.10,0.30];
  let t=audioCtx.currentTime+0.05;
  for(let i=0;i<notes.length;i++){
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    // timbre tipo trompeta: sawtooth + harmónicos
    o.type='sawtooth';
    o.frequency.value=notes[i];
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.3,t+0.02);
    g.gain.setValueAtTime(0.28,t+durs[i]-0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+durs[i]+0.04);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+durs[i]+0.06);
    // segunda voz (armonía quinta)
    const o2=audioCtx.createOscillator();
    const g2=audioCtx.createGain();
    o2.type='sawtooth';
    o2.frequency.value=notes[i]*1.5;
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(0.10,t+0.02);
    g2.gain.exponentialRampToValueAtTime(0.001,t+durs[i]+0.04);
    o2.connect(g2); g2.connect(master);
    o2.start(t); o2.stop(t+durs[i]+0.06);
    t+=durs[i];
  }
}

function wrongBuzz(){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sawtooth'; o.frequency.value=160;
  g.gain.setValueAtTime(.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.4);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+.45);
}

  ctx.beginPath(); ctx.moveTo(9,-5);  ctx.lineTo(18-wave*9,-17-Math.abs(wave)*9); ctx.stroke();

function drawGoal(){
  const g=goalRect();
  ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.fillRect(g.x,g.y,g.w,g.h);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  for(let c=0;c<=8;c++){ ctx.beginPath(); ctx.moveTo(g.x+c*g.w/8,g.y); ctx.lineTo(g.x+c*g.w/8,g.y+g.h); ctx.stroke(); }
  for(let r=0;r<=4;r++){ ctx.beginPath(); ctx.moveTo(g.x,g.y+r*g.h/4); ctx.lineTo(g.x+g.w,g.y+r*g.h/4); ctx.stroke(); }
  ctx.fillStyle='#ddd'; ctx.fillRect(g.x-5,g.y-4,10,g.h+8); ctx.fillRect(g.x+g.w-5,g.y-4,10,g.h+8); ctx.fillRect(g.x-5,g.y-4,g.w+10,8);
  const fs=Math.min(32,g.w/(wordLetters.length*1.15));
  ctx.font=`bold ${fs}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  const step=g.w/(wordLetters.length+1);
  for(let i=0;i<wordLetters.length;i++){
    const cx=g.x+step*(i+1);
    ctx.fillStyle=wordLetters[i]==='_'?'#FFD700':'#fff';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText(wordLetters[i],cx,g.y+g.h/2); ctx.shadowBlur=0;
  }
  if(goalFlash){ ctx.fillStyle=`rgba(255,220,0,${goalFlash.life*.5})`; ctx.fillRect(g.x,g.y,g.w,g.h); }
}

// ── FLASHES DE CÁMARA (gradas) ──────────────────
function updateFlashes(dt){
  crowdT += 0; // already incremented elsewhere
  nextFlashTime -= dt;
  if(nextFlashTime <= 0){
    // spawn 1-3 flashes at stands height (top 42% of screen)
    const count = 1 + Math.floor(Math.random()*3);
    for(let i=0;i<count;i++){
      cameraFlashes.push({
        x: 20 + Math.random()*(W-40),
        y: 10 + Math.random()*(H*0.40),
        life: 1,
        size: 6 + Math.random()*10,
        decay: 3 + Math.random()*4,
      });
    }
    nextFlashTime = 0.18 + Math.random()*0.55;
  }
  for(let i=cameraFlashes.length-1;i>=0;i--){
    cameraFlashes[i].life -= dt * cameraFlashes[i].decay;
    if(cameraFlashes[i].life <= 0) cameraFlashes.splice(i,1);
  }
}

function drawFlashes(){
  for(const f of cameraFlashes){
    const alpha = f.life * 0.85;
    ctx.save();
    ctx.globalAlpha = alpha;
    // punto central brillante
    const grd = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size);
    grd.addColorStop(0,'rgba(255,255,255,1)');
    grd.addColorStop(0.3,'rgba(220,240,255,0.8)');
    grd.addColorStop(1,'rgba(200,220,255,0)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.size,0,Math.PI*2); ctx.fill();
    // rayitos
    ctx.strokeStyle=`rgba(255,255,255,${alpha*0.6})`;
    ctx.lineWidth=1;
    for(let r=0;r<4;r++){
      const ang=r*Math.PI/2 + crowdT*2;
      ctx.beginPath();
      ctx.moveTo(f.x+Math.cos(ang)*f.size*0.5, f.y+Math.sin(ang)*f.size*0.5);
      ctx.lineTo(f.x+Math.cos(ang)*f.size*1.8, f.y+Math.sin(ang)*f.size*1.8);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawBall(b){
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.spin);
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(3,6,b.radius*.85,b.radius*.35,0,0,Math.PI*2); ctx.fill();
  const gr=ctx.createRadialGradient(-4,-5,2,0,0,b.radius);
  gr.addColorStop(0,'#fff'); gr.addColorStop(.4,'#eee'); gr.addColorStop(1,'#bbb');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(0,0,b.radius,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333'; ctx.beginPath();
  for(let a=0;a<5;a++){ const ag=(a*2*Math.PI/5)-Math.PI/2; const px=Math.cos(ag)*b.radius*.44,py=Math.sin(ag)*b.radius*.44; a===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,b.radius*.13,0,Math.PI*2); ctx.fill();
  ctx.font=`bold ${Math.round(b.radius*1.45)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.strokeStyle='#111'; ctx.lineWidth=2.5; ctx.fillStyle='#FFD700';
  ctx.strokeText(b.letter,0,0); ctx.fillText(b.letter,0,0);
  // corona si el rival lo lleva
  if(rival.hasBall && rival.target && b===rival.target && !b.kicked){
    // crown always shown — player must decide if it's the right letter
    ctx.font='14px Arial'; ctx.fillText('🔴',0,-b.radius-8);
  }
  ctx.restore();
}

//  DRAW — PLAYER (cartoon azul estilo imagen)
// ═══════════════════════════════════════════════
function drawCartoonPlayer(x, y, facing, legAngle, kicking, kickTimer, jersey, isRival) {
  ctx.save();
  ctx.translate(x, y);

  const f = facing;
  const leg = kicking ? (kickTimer>.5 ? -1.2 : .6) : Math.sin(legAngle)*.55;
  const arm = Math.sin(legAngle)*.4;

  // SOMBRA
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0,28,18,6,0,0,Math.PI*2); ctx.fill();

  // PIERNAS (pantalón blanco)
  ctx.save(); ctx.scale(f,1);
  // pierna trasera
  ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(-Math.sin(leg)*16+2,24); ctx.stroke();
  // pierna delantera
  ctx.strokeStyle='#fff';
  ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(Math.sin(leg)*16-2,24); ctx.stroke();
  // medias (azul)
  ctx.strokeStyle=jersey.sock; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(-Math.sin(leg)*16+2,24); ctx.lineTo(-Math.sin(leg)*17+1,32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(Math.sin(leg)*16-2,24); ctx.lineTo(Math.sin(leg)*17-1,32); ctx.stroke();
  // zapatos (negro)
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(-Math.sin(leg)*17,33,8,4,leg*.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(Math.sin(leg)*17-1,33,8,4,-leg*.3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // CUERPO (camiseta con gradiente)
  const bg=ctx.createLinearGradient(-16,-14,16,14);
  bg.addColorStop(0,jersey.light); bg.addColorStop(.5,jersey.main); bg.addColorStop(1,jersey.dark);
  ctx.fillStyle=bg;
  // forma camiseta con hombros
  ctx.beginPath();
  ctx.moveTo(-16,-14); ctx.lineTo(-18,-6); ctx.lineTo(-13,14);
  ctx.lineTo(13,14); ctx.lineTo(18,-6); ctx.lineTo(16,-14);
  ctx.quadraticCurveTo(0,-18,0,-18);
  ctx.quadraticCurveTo(0,-18,-16,-14);
  ctx.fill();
  // cuello V
  ctx.fillStyle=jersey.neck||'#fff';
  ctx.beginPath(); ctx.moveTo(-5,-14); ctx.lineTo(0,-10); ctx.lineTo(5,-14); ctx.fill();
  // número
  ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('10',0,2);
  // escudo pequeño
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(-6,-5,4,0,Math.PI*2); ctx.fill();

  // BRAZOS
  ctx.save(); ctx.scale(f,1);
  ctx.strokeStyle=jersey.main; ctx.lineWidth=8; ctx.lineCap='round';
  // brazo izquierdo
  ctx.beginPath(); ctx.moveTo(-14,-10); ctx.lineTo(-22,-2+arm*12); ctx.stroke();
  // brazo derecho  
  ctx.beginPath(); ctx.moveTo(14,-10); ctx.lineTo(22,-2-arm*12); ctx.stroke();
  // manos
  ctx.fillStyle=jersey.skin;
  ctx.beginPath(); ctx.arc(-22,-2+arm*12,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22,-2-arm*12,4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // CUELLO
  ctx.fillStyle=jersey.skin;
  ctx.beginPath(); ctx.ellipse(0,-16,5,4,0,0,Math.PI*2); ctx.fill();

  // CABEZA (grande, cartoon)
  // pelo
  ctx.fillStyle=jersey.hair;
  ctx.beginPath(); ctx.arc(0,-32,17,Math.PI,0); ctx.fill();
  // mechones estilo cartoon
  ctx.beginPath(); ctx.arc(-14,-34,7,Math.PI*1.2,Math.PI*.2); ctx.fill();
  ctx.beginPath(); ctx.arc(14,-34,7,Math.PI*.8,Math.PI*-.2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-48,6,8,0,0,Math.PI*2); ctx.fill();
  // cara
  const fg=ctx.createRadialGradient(-3,-30,3,0,-30,17);
  fg.addColorStop(0,'#fdebd0'); fg.addColorStop(1,jersey.skin);
  ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,-30,16,0,Math.PI*2); ctx.fill();
  // cejas
  ctx.strokeStyle=jersey.hair; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-9,-36); ctx.quadraticCurveTo(-6,-38,-3,-36); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,-36);  ctx.quadraticCurveTo(6,-38,9,-36);   ctx.stroke();
  // ojos grandes cartoon
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(-6,-31,5,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(6,-31,5,6,0,0,Math.PI*2); ctx.fill();
  // iris
  ctx.fillStyle=isRival?'#8B0000':'#4a2c00';
  ctx.beginPath(); ctx.arc(-6,-31,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-31,3.5,0,Math.PI*2); ctx.fill();
  // pupila
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-5.5,-31,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.5,-31,1.8,0,Math.PI*2); ctx.fill();
  // brillo ojo
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-4.5,-32,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7.5,-32,1,0,Math.PI*2); ctx.fill();
  // nariz
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.arc(0,-27,3,0,Math.PI); ctx.fill();
  // boca sonrisa
  ctx.strokeStyle='#c0392b'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,-23,6,0.2,Math.PI-.2); ctx.stroke();
  // mejillas
  ctx.fillStyle='rgba(255,150,100,0.35)';
  ctx.beginPath(); ctx.ellipse(-10,-26,5,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,-26,5,3,0,0,Math.PI*2); ctx.fill();
  // orejas
  ctx.fillStyle=jersey.skin;
  ctx.beginPath(); ctx.ellipse(-16,-30,4,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(16,-30,4,5,0,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

const JERSEY_BLUE = { main:'#1565c0', light:'#1e88e5', dark:'#0d47a1', sock:'#1565c0', skin:'#fde4b0', hair:'#5d3a1a', neck:'#fff' };
const JERSEY_RED  = { main:'#c62828', light:'#ef5350', dark:'#b71c1c', sock:'#c62828', skin:'#d4a06a', hair:'#1a1a1a', neck:'#fff' };

function drawJoystick(){
  const jc=joyCenter();
  // Actualizar posición del knob cuando no hay toque activo
  if(!joy.active){ joy.kx=jc.x; joy.ky=jc.y; }

  ctx.save();
  ctx.globalAlpha=joy.active ? 0.55 : 0.32;

  // Aro exterior
  ctx.beginPath(); ctx.arc(jc.x,jc.y,JOY_R,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2.5; ctx.stroke();

  // Marcas de dirección (pequeñas flechas en el aro)
  const dirs=[{a:-Math.PI/2,s:'▲'},{a:Math.PI/2,s:'▼'},{a:Math.PI,s:'◀'},{a:0,s:'▶'}];
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='11px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const d of dirs){
    ctx.fillText(d.s, jc.x+Math.cos(d.a)*(JOY_R-10), jc.y+Math.sin(d.a)*(JOY_R-10));
  }

  // Sombra del knob
  ctx.beginPath(); ctx.arc(joy.kx+3,joy.ky+3,JOY_KR,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();

  // Knob
  const kg=ctx.createRadialGradient(joy.kx-6,joy.ky-6,3,joy.kx,joy.ky,JOY_KR);
  kg.addColorStop(0,'rgba(100,160,255,0.95)');
  kg.addColorStop(0.5,'rgba(20,80,200,0.9)');
  kg.addColorStop(1,'rgba(0,40,120,0.85)');
  ctx.beginPath(); ctx.arc(joy.kx,joy.ky,JOY_KR,0,Math.PI*2);
  ctx.fillStyle=kg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2; ctx.stroke();

  // Brillo del knob
  ctx.beginPath(); ctx.arc(joy.kx-7,joy.ky-7,8,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.fill();

  ctx.restore();
}

    ctx.fillText(`Continúa disponible: ${continues}`,W/2,H*0.55);

    // Cuenta regresiva circular
    const cr=36, cx=W/2, cy=H*0.66;

    const frac=Math.max(0,Math.min(1,countdownT/COUNTDOWN));
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.stroke();

      ctx.strokeStyle='#FFD700'; ctx.lineWidth=6;
      ctx.beginPath(); ctx.arc(cx,cy,cr,-Math.PI/2,-Math.PI/2+Math.PI*2*frac,false); ctx.stroke();
    }
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.min(W*0.07,28)}px Arial`;
    ctx.fillText(Math.max(0,secs),cx,cy+1);

    // Botón CONTINUAR
    const bw=Math.min(240,W*0.62), bh=50;
    const bx=W/2-bw/2, by=H*0.76;
    const bg=ctx.createLinearGradient(bx,by,bx,by+bh);

    ctx.font=`bold ${Math.min(20,bw*0.085)}px Arial`;

    // Botón REINICIAR
    const bw2=Math.min(200,W*0.52), bh2=42;
    const bx2=W/2-bw2/2, by2=H*0.87;
    ctx.fillStyle='rgba(100,100,120,0.7)';
    ctx.beginPath(); ctx.roundRect(bx2,by2,bw2,bh2,11); ctx.fill();
    ctx.fillStyle='#ccc';
    ctx.font=`bold ${Math.min(17,bw2*0.085)}px Arial`;
    ctx.fillText('↺ Reiniciar',W/2,by2+bh2/2);

  } else {
    // Sin continues — solo reiniciar
    ctx.fillStyle='rgba(255,100,100,0.9)';
    ctx.font=`bold ${Math.min(W*0.06,24)}px Arial`;
    ctx.fillText('Sin continúas disponibles',W/2,H*0.56);

    const bw=Math.min(250,W*0.65), bh=52;
    const bx=W/2-bw/2, by=H*0.68;
    const bg=ctx.createLinearGradient(bx,by,bx,by+bh);

    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,13); ctx.fill();

    ctx.font=`bold ${Math.min(20,bw*0.085)}px Arial`;
    ctx.fillText('🎮 Nuevo juego',W/2,by+bh/2);
  }
}

function updateRival(dt){
  const g=goalRect();
  // Reasignar target si no tiene o el actual ya fue pateado
  if(!rival.target || rival.target.kicked){
    if(!rival.hasBall){
      const avail=balls.filter(b=>!b.kicked);
      rival.target = avail.length ? avail[Math.floor(Math.random()*avail.length)] : null;
      rival.rivalLetter = rival.target ? rival.target.letter : '';
    }
  }
  if(!rival.target) return;
  let tx=rival.target.x, ty=rival.target.y;

  if(rival.hasBall){
    // Llevar el balón lejos del jugador (huir)
    const awayX=rival.x+(rival.x-player.x), awayY=rival.y+(rival.y-player.y);
    tx=awayX; ty=awayY;
    // clamp dentro de cancha
    tx=Math.max(60,Math.min(W-60,tx));
    ty=Math.max(H*0.58,Math.min(H-60,ty));
    // mover balón pegado al rival
    rival.target.x=rival.x + rival.facing*18;
    rival.target.y=rival.y+18;
    rival.target.vx=0; rival.target.vy=0;
  } else {
    // Perseguir la pelota correcta
    tx=rival.target.x; ty=rival.target.y;
  }

  const dx=tx-rival.x, dy=ty-rival.y, dist=Math.hypot(dx,dy);
  if(dist>4){
    rival.x+=dx/dist*rival.speed*dt;
    rival.y+=dy/dist*rival.speed*dt;
    rival.facing=dx>0?1:-1;
    rival.legAngle+=5*dt;
  }

  // ¿El rival alcanza su pelota?
  if(!rival.hasBall && rival.target && !rival.target.kicked){
    const d2=Math.hypot(rival.target.x-rival.x, rival.target.y-rival.y);
    if(d2<rival.radius+rival.target.radius){
      rival.hasBall=true;
      rival.rivalLetter=rival.target.letter;
      const isRight = rival.rivalLetter===correctLetter;
      showHint(isRight
        ? `⚠️ ¡Lleva la "${rival.rivalLetter}"! ¡Quítasela!`
        : `👀 Lleva la "${rival.rivalLetter}" — ¿es la que falta?`);
    }
  }

  // Clamp rival dentro de la cancha
  rival.x=Math.max(40,Math.min(W-40,rival.x));
  rival.y=Math.max(H*0.55+30,Math.min(H-50,rival.y));
}

// ═══════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════
function gameOver(){
  gameRunning=false;
  gameOverScreen=true;
  countdownT=COUNTDOWN;
  document.getElementById('msg').style.opacity='0'; msgTimer=0;
}

function doRealRestart(){
  gameOverScreen=false; continues=2;
  score=0; lives=3; updateHUD();
  particles=[];
  player.x=W/2; player.y=H*.72;
  rival.x=W/2+80; rival.y=H*.5;
  pickWord(); gameRunning=true;
}

function doContinue(){
  gameOverScreen=false;
  lives=3; updateHUD();
  particles=[];
  player.x=W/2; player.y=H*.72;
  rival.x=W/2+80; rival.y=H*.5;
  pickWord(); gameRunning=true;
}

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
let lastTime=0;
function update(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts; crowdT+=dt;
  updateFlashes(dt);

  // ── PANTALLA DE GAME OVER ──────────────────
  if(gameOverScreen){
    countdownT-=dt;
    if(countdownT<=0){
      // Se acabó el tiempo de countdown → reinicio total
      doRealRestart();
      requestAnimationFrame(update); return;
    }
    ctx.clearRect(0,0,W,H);
    if(bgImg.complete && bgImg.naturalWidth>0){ ctx.drawImage(bgImg,0,0,W,H); } else { drawField(); }
    drawGameOverScreen();
    requestAnimationFrame(update); return;
  }

  // ── PANTALLA DE CAMPEONATO ──────────────────
  if(championship){
    champTimer+=dt;
    champJumpT+=dt;
    ctx.clearRect(0,0,W,H);
    if(bgImg.complete && bgImg.naturalWidth>0){ ctx.drawImage(bgImg,0,0,W,H); } else { drawField(); }
    drawFlashes();
    // confetti de partículas
    if(Math.random()<0.3) burst(Math.random()*W, Math.random()*H*0.5, ['#FFD700','#e63946','#4cc9f0','#f72585','#06d6a0'][Math.floor(Math.random()*5)], 3);
    particles=particles.filter(p=>p.life>0);
    for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;p.life-=p.decay*0.5;p.r*=.995;}
    drawParticles();
    drawChampionship();
    requestAnimationFrame(update);
    return;
  }

  if(!gameRunning){requestAnimationFrame(update);return;}

  // — Mover jugador
  let mx=0,my=0;
  // Joystick virtual
  if(joy.active){ mx=joy.dx*0.28; my=joy.dy*0.28; }
  // Teclado
  if(keys['ArrowLeft'] ||keys['a']) mx-=1;
  if(keys['ArrowRight']||keys['d']) mx+=1;
  if(keys['ArrowUp']   ||keys['w']) my-=1;
  if(keys['ArrowDown'] ||keys['s']) my+=1;
  // dpad alias (ya no se usa pero se conserva por seguridad)
  if(dpad.left ) mx-=1;
  if(dpad.right) mx+=1;
  if(dpad.up   ) my-=1;
  if(dpad.down ) my+=1;
  const ml=Math.hypot(mx,my);
  if(ml>0){ player.x+=mx/ml*player.speed*dt; player.y+=my/ml*player.speed*dt; player.legAngle+=5.5*dt; player.armAngle+=5.5*dt; if(mx!==0)player.facing=mx>0?1:-1; }

  // Clamp jugador
  const g=goalRect();
  player.x=Math.max(player.radius,Math.min(W-player.radius,player.x));
  player.y=Math.max(H*0.55+player.radius,Math.min(H-player.radius-48,player.y));

  // Kick timer
  if(player.kicking){ player.kickTimer-=dt*2; if(player.kickTimer<=0){player.kicking=false;player.kickTimer=0;} }

  // Rival AI
  updateRival(dt);

  // — Tackle: jugador choca con rival que tiene el balón
  if(rival.hasBall){
    const td=Math.hypot(player.x-rival.x,player.y-rival.y);
    if(td<player.radius+rival.radius+8){
      rival.hasBall=false;
      rival.target=null;
      tackleSound();
      burst(rival.x,rival.y,'#FFD700',14);
      const wasRight = rival.rivalLetter===correctLetter;
      if(wasRight){
                showHint('✅ ¡Letra correcta recuperada! ¡Dispara! ⚽');
        // pequeña fanfarria al recuperar la letra correcta
        setTimeout(()=>{ if(audioCtx){ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='square'; o.frequency.value=880; g.gain.setValueAtTime(.15,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.25); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+.28); } },0);
      } else {
        // wrong letter — penalize
        lives--; updateHUD(); missFlash={life:1};
        wrongBuzz();
        burst(rival.x,rival.y,'#e63946',14);
        showMsg('❌ ¡Esa no era la letra!');
        if(lives<=0) setTimeout(gameOver,1200);
        else setTimeout(()=>spawnBalls(),1300);
      }
    }
  }

  // — Empuje de pelotas: solo separar posición, sin lanzarlas
  for(const b of balls){
    if(b.kicked) continue;
    if(rival.hasBall && rival.target && b===rival.target) continue;
    const ddx=b.x-player.x, ddy=b.y-player.y, dd=Math.hypot(ddx,ddy);
    const md=player.radius+b.radius;
    if(dd<md && dd>0){
      const nx=ddx/dd, ny=ddy/dd;
      b.x=player.x+nx*(md+1);
      b.y=player.y+ny*(md+1);
      b.vx=0; b.vy=0;
    }
  }

  // — Actualizar pelotas
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    if(rival.hasBall&&rival.target&&b===rival.target&&!b.kicked) continue; // el rival lo controla
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    // pelotas pateadas: sin fricción. Pelotas sueltas: frenar rápido
    if(b.kicked){ b.spin+=8*dt; }
    else { b.vx*=.75; b.vy*=.75; b.spin+=b.spinSpd*dt; b.spinSpd*=.80; }
    if(b.x-b.radius<0){b.x=b.radius;b.vx=Math.abs(b.vx);}
    if(b.x+b.radius>W){b.x=W-b.radius;b.vx=-Math.abs(b.vx);}
    if(b.y+b.radius>H-35){b.y=H-35-b.radius;b.vy=-Math.abs(b.vy)*.5;}
    if(!b.kicked&&b.y-b.radius<H*0.56){b.y=H*0.56+b.radius;b.vy=Math.abs(b.vy);}
    // ¿entró a la portería?
    if(b.kicked&&b.x>g.x&&b.x<g.x+g.w&&b.y-b.radius<g.y+g.h&&b.y>g.y){
      balls.splice(i,1);
      if(b.kickedLetter===correctLetter){
        score++; updateHUD(); goalFlash={life:1}; goalRoar();
        burst(g.x+g.w/2,g.y+g.h/2,'#FFD700',28); burst(g.x+g.w/2,g.y+g.h/2,'#fff',14);
        trumpetFanfare();
        if(score>=10){
          // ¡CAMPEONATO!
          gameRunning=false; championship=true; champTimer=0; champJumpT=0;
          showMsg('');
          // Fanfarria larga
          setTimeout(()=>{ trumpetFanfare(); setTimeout(trumpetFanfare,900); },100);
        } else {
          showMsg('⚽ ¡GOL!'); setTimeout(()=>pickWord(),1500);
        }
      } else {
        lives--; updateHUD(); missFlash={life:1};
        burst(g.x+g.w/2,g.y+g.h/2,'#e63946',18);
        showMsg('❌ ¡Letra incorrecta!');
        if(lives<=0)setTimeout(gameOver,1200); else setTimeout(()=>spawnBalls(),1300);
      }
    }
    if(b.kicked&&b.y+b.radius<0) balls.splice(i,1);
  }

  // Partículas
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=105*dt;p.life-=p.decay;p.r*=.99;}

  // Flashes
  if(goalFlash){goalFlash.life-=dt*1.8;if(goalFlash.life<=0)goalFlash=null;}
  if(missFlash){missFlash.life-=dt*1.8;if(missFlash.life<=0)missFlash=null;}
  if(msgTimer>0){msgTimer-=dt;if(msgTimer<=0)document.getElementById('msg').style.opacity='0';}

  // ═══ DIBUJO ═══
  ctx.clearRect(0,0,W,H);
  // Fondo estadio
  if(bgImg.complete && bgImg.naturalWidth>0){
    ctx.drawImage(bgImg, 0, 0, W, H);
  } else {
    drawField();
  }
  drawFlashes();
  drawGoal();
  drawPortero();
  balls.forEach(drawBall);

  // Rival
  drawCartoonPlayer(rival.x, rival.y, rival.facing, rival.legAngle, false, 0, JERSEY_RED, true);

  // Jugador
  drawCartoonPlayer(player.x, player.y, player.facing, player.legAngle, player.kicking, player.kickTimer, JERSEY_BLUE, false);

  drawParticles();
  drawJoystick();
  drawShootBtn();

  if(missFlash){ctx.save();ctx.globalAlpha=missFlash.life*.25;ctx.fillStyle='#e63946';ctx.fillRect(0,0,W,H);ctx.restore();}

  requestAnimationFrame(update);
}

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  player.x=W/2; player.y=H*.85;
  rival.x=W/2+90; rival.y=H*.70;
  initCrowd(); startAudio(); pickWord();
  gameRunning=true;
  requestAnimationFrame(update);
});
</script>
